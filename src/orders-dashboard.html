<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TCDining — Orders</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --surface2: #f0ede8;
      --text: #1a1a18;
      --text-muted: #7a7872;
      --accent: #2d6a4f;
      --accent-light: #d8f3dc;
      --border: #e4e1da;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
      --radius: 12px;
      --radius-sm: 8px;
      --new: #2d6a4f;
      --new-bg: #d8f3dc;
      --preparing: #b45309;
      --preparing-bg: #fef3c7;
      --ready: #1d4ed8;
      --ready-bg: #dbeafe;
      --done: #6b7280;
      --done-bg: #f3f4f6;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(247,246,243,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      gap: 16px;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .logo span { color: var(--accent); }
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-light);
      padding: 5px 12px;
      border-radius: 99px;
    }
    .live-dot {
      width: 7px;
      height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .btn-refresh {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 7px 14px;
      border-radius: 99px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-refresh:hover { background: var(--surface2); color: var(--text); }
    .btn-refresh.spinning svg { animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── STATS BAR ── */
    .stats-bar {
      display: flex;
      gap: 12px;
      padding: 20px 32px;
      overflow-x: auto;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      min-width: 130px;
      flex-shrink: 0;
    }
    .stat-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 500;
      line-height: 1;
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      padding: 0 32px 20px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { background: var(--surface2); color: var(--text); }
    .filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }
    .filter-spacer { flex: 1; }
    .search-box {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      padding: 7px 14px;
      border: 1px solid var(--border);
      border-radius: 99px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      width: 200px;
      transition: border-color 0.15s;
    }
    .search-box:focus { border-color: var(--accent); }

    /* ── ORDERS GRID ── */
    .orders-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      padding: 0 32px 40px;
    }

    /* ── ORDER CARD ── */
    .order-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s, transform 0.2s;
      animation: fadeUp 0.3s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .order-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
    .order-card.status-done { opacity: 0.6; }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 16px 18px 12px;
      gap: 8px;
      border-bottom: 1px solid var(--border);
    }
    .order-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 500;
    }
    .order-phone {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .status-badge {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 99px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .status-new      { background: var(--new-bg);      color: var(--new); }
    .status-preparing{ background: var(--preparing-bg); color: var(--preparing); }
    .status-ready    { background: var(--ready-bg);    color: var(--ready); }
    .status-done     { background: var(--done-bg);     color: var(--done); }

    .card-items {
      padding: 12px 18px;
      flex: 1;
    }
    .card-item-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      padding: 4px 0;
      font-size: 0.85rem;
      border-bottom: 1px dashed var(--border);
    }
    .card-item-row:last-child { border-bottom: none; }
    .item-name { font-weight: 500; }
    .item-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 1px; }
    .item-price { font-weight: 600; font-size: 0.82rem; white-space: nowrap; }

    .card-notes {
      margin: 0 18px 12px;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      font-size: 0.78rem;
      color: #92400e;
    }
    .card-notes strong { display: block; margin-bottom: 2px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      border-top: 1px solid var(--border);
      gap: 8px;
    }
    .order-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.4;
    }
    .order-total {
      font-weight: 700;
      font-size: 1rem;
    }
    .status-select {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      outline: none;
    }
    .status-select:focus { border-color: var(--accent); }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 6px; color: var(--text); }
    .empty-sub { font-size: 0.88rem; }

    /* ── LOADING ── */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
      gap: 16px;
      grid-column: 1 / -1;
    }
    .loader-bar {
      width: 120px;
      height: 2px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .loader-fill {
      height: 100%;
      background: var(--accent);
      animation: loadAnim 1.2s ease-in-out infinite;
    }
    @keyframes loadAnim {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(200%); }
    }

    /* ── CONFIG SCREEN ── */
    #config-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .config-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      max-width: 420px;
      width: 100%;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }
    .config-logo {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .config-logo span { color: var(--accent); }
    .config-sub { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 28px; }
    .config-field { margin-bottom: 14px; text-align: left; }
    .config-field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 5px;
    }
    .config-field input {
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .config-field input:focus { border-color: var(--accent); }
    .config-hint { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
    .btn-connect {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn-connect:hover { background: #1b4332; }
    .config-error { color: #c0392b; font-size: 0.82rem; margin-top: 10px; display: none; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--text);
      color: #fff;
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 500;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 600px) {
      header { padding: 0 16px; }
      .stats-bar, .filter-bar, .orders-grid { padding-left: 16px; padding-right: 16px; }
      .search-box { width: 140px; }
    }
  </style>
</head>
<body>

    <<!-- Config screen (shown if no worker URL saved) -->
    <div id="config-screen">
        <form class="config-box" autocomplete="on" onsubmit="event.preventDefault(); connectWorker();">
            <div class="config-logo">TC<span>Dining</span></div>
            <div class="config-sub">Connect to your Cloudflare Worker to view orders</div>
            <div class="config-field">
                <label for="cfg-worker-url">Worker URL</label>
                <input type="url"
                       id="cfg-worker-url"
                       name="username"
                       placeholder="https://tcdining-orders.yourname.workers.dev"
                       autocomplete="username"
                       required>
                <div class="config-hint">Your deployed Cloudflare Worker URL</div>
            </div>
            <div class="config-field">
                <label for="cfg-token">Dashboard Token</label>
                <input type="password"
                       id="cfg-token"
                       name="current-password"
                       placeholder="your-secret-token"
                       autocomplete="current-password"
                       required>
                <div class="config-hint">The DASHBOARD_TOKEN you set in Worker secrets</div>
            </div>
            <button class="btn-connect" type="submit">Connect →</button>
            <div class="config-error" id="cfg-error"></div>
        </form>
    </div>

    <!-- Main dashboard (hidden until connected) -->
    <div id="dashboard" style="display:none">
        <header>
            <div class="logo">TC<span>Dining</span> <span style="font-family:'DM Sans';font-size:0.9rem;font-weight:400;color:var(--text-muted);margin-left:8px;">Orders</span></div>
            <div class="header-right">
                <div class="live-badge"><div class="live-dot"></div> Live</div>
                <button class="btn-refresh" id="refresh-btn" onclick="loadOrders()">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 4v6h6" /><path d="M23 20v-6h-6" /><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15" /></svg>
                    Refresh
                </button>
                <button class="btn-refresh" onclick="disconnect()" style="color:#c0392b">Disconnect</button>
            </div>
        </header>

        <div class="stats-bar" id="stats-bar">
            <div class="stat-card"><div class="stat-label">Total Orders</div><div class="stat-value" id="stat-total">—</div></div>
            <div class="stat-card"><div class="stat-label">New</div><div class="stat-value" id="stat-new">—</div></div>
            <div class="stat-card"><div class="stat-label">Preparing</div><div class="stat-value" id="stat-preparing">—</div></div>
            <div class="stat-card"><div class="stat-label">Ready</div><div class="stat-value" id="stat-ready">—</div></div>
            <div class="stat-card"><div class="stat-label">Today's Revenue</div><div class="stat-value" id="stat-revenue">—</div></div>
        </div>

        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
            <button class="filter-btn" data-filter="new" onclick="setFilter('new', this)">New</button>
            <button class="filter-btn" data-filter="preparing" onclick="setFilter('preparing', this)">Preparing</button>
            <button class="filter-btn" data-filter="ready" onclick="setFilter('ready', this)">Ready</button>
            <button class="filter-btn" data-filter="done" onclick="setFilter('done', this)">Done</button>
            <div class="filter-spacer"></div>
            <input class="search-box" type="text" placeholder="Search name…" oninput="renderOrders()" id="search-input">
        </div>

        <div class="orders-grid" id="orders-grid">
            <div id="loading">
                <div style="color:var(--text-muted);font-size:0.9rem;">Loading orders…</div>
                <div class="loader-bar"><div class="loader-fill"></div></div>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        let WORKER_URL = '';
        let TOKEN = '';
        let allOrders = [];
        let activeFilter = 'all';
        let autoRefreshTimer = null;

        // ── CONFIG ──
        function connectWorker() {
            const url = document.getElementById('cfg-worker-url').value.trim().replace(/\/$/, '');
            const token = document.getElementById('cfg-token').value.trim();
            const errEl = document.getElementById('cfg-error');
            if (!url || !token) { errEl.textContent = 'Please fill in both fields.'; errEl.style.display = 'block'; return; }
            WORKER_URL = url;
            TOKEN = token;
            localStorage.setItem('tc_worker_url', url);
            localStorage.setItem('tc_token', token);
            showDashboard();
        }

        function disconnect() {
            localStorage.removeItem('tc_worker_url');
            localStorage.removeItem('tc_token');
            clearInterval(autoRefreshTimer);
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('config-screen').style.display = 'flex';
        }

        function showDashboard() {
            document.getElementById('config-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadOrders();
            autoRefreshTimer = setInterval(loadOrders, 30000); // auto-refresh every 30s
        }

        // ── LOAD ORDERS ──
        async function loadOrders() {
            const btn = document.getElementById('refresh-btn');
            btn.classList.add('spinning');
            try {
                const res = await fetch(`${WORKER_URL}/orders?token=${TOKEN}`);
                if (!res.ok) { showToast('Failed to load orders — check your token'); btn.classList.remove('spinning'); return; }
                allOrders = await res.json();
                updateStats();
                renderOrders();
            } catch (e) {
                showToast('Could not reach worker — check the URL');
            }
            btn.classList.remove('spinning');
        }

        // ── STATS ──
        function updateStats() {
            const today = new Date().toDateString();
            const todayOrders = allOrders.filter(o => new Date(o.timestamp).toDateString() === today);
            document.getElementById('stat-total').textContent = allOrders.length;
            document.getElementById('stat-new').textContent = allOrders.filter(o => o.status === 'new').length;
            document.getElementById('stat-preparing').textContent = allOrders.filter(o => o.status === 'preparing').length;
            document.getElementById('stat-ready').textContent = allOrders.filter(o => o.status === 'ready').length;
            const rev = todayOrders.reduce((s, o) => s + (parseFloat(o.total) || 0), 0);
            document.getElementById('stat-revenue').textContent = `$${rev.toFixed(2)}`;
        }

        // ── FILTER ──
        function setFilter(f, el) {
            activeFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            renderOrders();
        }

        // ── RENDER ──
        function renderOrders() {
            const grid = document.getElementById('orders-grid');
            const search = document.getElementById('search-input').value.toLowerCase();
            let filtered = allOrders.filter(o => {
                if (activeFilter !== 'all' && o.status !== activeFilter) return false;
                if (search && !o.name.toLowerCase().includes(search) && !o.phone.includes(search)) return false;
                return true;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">🍽️</div>
              <div class="empty-title">No orders yet</div>
              <div class="empty-sub">Orders will appear here as customers place them</div>
            </div>`;
                return;
            }

            grid.innerHTML = filtered.map((order, i) => {
                const date = new Date(order.timestamp);
                const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const dateStr = date.toLocaleDateString([], { month: 'short', day: 'numeric' });
                const isToday = date.toDateString() === new Date().toDateString();

                const itemsHtml = (order.items || []).map(item => `
            <div class="card-item-row">
              <div>
                <div class="item-name">${item.name} ×${item.quantity}</div>
                <div class="item-meta">${[item.prep, item.drink].filter(Boolean).join(' · ')}</div>
              </div>
              <div class="item-price">$${(parseFloat(item.price || 0) * item.quantity).toFixed(2)}</div>
            </div>`).join('');

                const notesHtml = order.specialInstructions ? `
            <div class="card-notes">
              <strong>📝 Special Instructions</strong>
              ${order.specialInstructions}
            </div>` : '';

                return `
            <div class="order-card status-${order.status}" id="card-${order.id}" style="animation-delay:${i * 0.04}s">
              <div class="card-header">
                <div>
                  <div class="order-name">${order.name}</div>
                  <div class="order-phone">${order.phone || 'No phone'}</div>
                </div>
                <span class="status-badge status-${order.status}">${order.status}</span>
              </div>
              <div class="card-items">${itemsHtml}</div>
              ${notesHtml}
              <div class="card-footer">
                <div>
                  <div class="order-total">$${parseFloat(order.total || 0).toFixed(2)}</div>
                  <div class="order-meta">${isToday ? timeStr : dateStr + ' ' + timeStr}</div>
                </div>
                <select class="status-select" onchange="updateStatus('${order.id}', this.value)">
                  <option value="new"      ${order.status === 'new' ? 'selected' : ''}>🟢 New</option>
                  <option value="preparing"${order.status === 'preparing' ? 'selected' : ''}>🟡 Preparing</option>
                  <option value="ready"   ${order.status === 'ready' ? 'selected' : ''}>🔵 Ready</option>
                  <option value="done"    ${order.status === 'done' ? 'selected' : ''}>⚫ Done</option>
                </select>
              </div>
            </div>`;
            }).join('');
        }

        // ── UPDATE STATUS ──
        async function updateStatus(id, status) {
            try {
                await fetch(`${WORKER_URL}/order/${id}?token=${TOKEN}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status }),
                });
                const order = allOrders.find(o => o.id === id);
                if (order) order.status = status;
                updateStats();
                renderOrders();
                showToast(`Order marked as ${status}`);
            } catch {
                showToast('Failed to update status');
            }
        }

        // ── TOAST ──
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        // ── INIT ──
        window.addEventListener('DOMContentLoaded', () => {
            const savedUrl = localStorage.getItem('tc_worker_url');
            const savedToken = localStorage.getItem('tc_token');
            if (savedUrl && savedToken) {
                WORKER_URL = savedUrl;
                TOKEN = savedToken;
                document.getElementById('cfg-worker-url').value = savedUrl;
                document.getElementById('cfg-token').value = savedToken;
                showDashboard();
            }
        });
    </script>
</body>
